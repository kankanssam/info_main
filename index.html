<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정왕고 정보과목 웹페이지</title>
    <style>
        :root {
            --navy: #1A237E;
            --blue: #283593;
            --blue-mid: #3949AB;
            --blue-light: #5C6BC0;
            --accent: #2979FF;
            --bg: #F0F2F8;
            --surface: #FFFFFF;
            --border: #DDE2F0;
            --text: #1A237E;
            --text-body: #2D3461;
            --muted: #7986CB;
            --tag-bg: #E8EAF6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: var(--bg);
            color: var(--text-body);
            min-height: 100vh;
        }

        /* NAV */
        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
        }

        .nav-brand {
            font-size: 1.15rem;
            font-weight: 900;
            color: var(--navy);
            letter-spacing: -0.5px;
        }

        .visitor-stats {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.82rem;
            color: var(--muted);
        }

        .stat-item { display: flex; align-items: center; gap: 5px; }
        .stat-item strong { font-weight: 700; color: var(--blue-mid); font-size: 0.9rem; }
        .stat-divider { width: 1px; height: 13px; background: var(--border); }

        /* HERO */
        .hero {
            background: linear-gradient(135deg, var(--navy) 0%, var(--blue-mid) 60%, var(--blue-light) 100%);
            padding: 44px 40px 48px;
            text-align: center;
        }

        .hero h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .hero p {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
        }

        /* MAIN */
        main {
            max-width: 1160px;
            margin: 0 auto;
            padding: 36px 24px 64px;
        }

        /* UNIT SECTION */
        .unit-section { margin-bottom: 36px; }

        .unit-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .unit-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            height: 28px;
            padding: 0 12px;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 700;
            background: var(--navy);
            color: #fff;
            flex-shrink: 0;
        }

        .unit-rule {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* CARD GRID */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 18px 16px;
            text-decoration: none;
            color: var(--text-body);
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s;
        }

        .card:hover {
            border-color: var(--blue-light);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(26,35,126,0.10);
        }

        .card-tag {
            display: inline-block;
            width: fit-content;
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 0.7rem;
            font-weight: 700;
            background: var(--tag-bg);
            color: var(--blue-mid);
            letter-spacing: 0.2px;
        }

        .card-topic {
            font-size: 0.97rem;
            font-weight: 600;
            line-height: 1.45;
            word-break: keep-all;
            flex: 1;
            color: var(--text-body);
        }

        .card-link {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 3px;
        }

        #loading-msg {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        /* FOOTER */
        footer {
            border-top: 1px solid var(--border);
            background: var(--surface);
            text-align: center;
            padding: 22px;
            font-size: 0.8rem;
            color: var(--muted);
            line-height: 1.8;
        }

        @media (max-width: 640px) {
            .navbar { padding: 0 20px; }
            .hero { padding: 32px 20px 36px; }
            .hero h1 { font-size: 1.4rem; }
            main { padding: 24px 16px 48px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">정왕고 정보과목</div>
        <div class="visitor-stats">
            <div class="stat-item">오늘 <strong id="today-count">-</strong></div>
            <div class="stat-divider"></div>
            <div class="stat-item">총 방문자 <strong id="total-count">-</strong></div>
        </div>
    </nav>

    <div class="hero">
        <h1>정왕고 정보과목 웹 보조자료</h1>
        <p>단원별 학습 자료를 확인하세요</p>
    </div>

    <main id="main-content">
        <div id="loading-msg">데이터를 불러오는 중입니다...</div>
    </main>

    <footer>
        © 2026 정왕고등학교. All rights reserved.<br>
        Developed by 김관동 / 한진우 / 이진석
    </footer>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTeppfMxUOempDMUrlnp_Qqm_aR6EZ3_yXM4mNvwZ3MFBLmMzzFJL47gpo158FxNWIAKcYFSR7Z1Amk/pub?gid=0&single=true&output=csv";
        const scriptUrl = "https://script.google.com/macros/s/AKfycbzOOa349MbJRIALvsZdKf-HzW-TVxK2BFjKcrgve_PBKWzS64r0kX-FZZHIqx1hjpbUXQ/exec";

        function parseCSVRow(row) {
            const result = [];
            let insideQuote = false;
            let currentValue = "";
            for (let i = 0; i < row.length; i++) {
                const char = row[i];
                if (char === '"') { insideQuote = !insideQuote; }
                else if (char === ',' && !insideQuote) { result.push(currentValue); currentValue = ""; }
                else { currentValue += char; }
            }
            result.push(currentValue);
            return result;
        }

        async function fetchAndRenderData() {
            const mainContent = document.getElementById('main-content');
            try {
                const response = await fetch(csvUrl + "&t=" + new Date().getTime());
                const data = await response.text();
                const rows = data.split(/\r?\n/);
                const unitMap = {};

                for (let i = 1; i < rows.length; i++) {
                    const rowData = rows[i].trim();
                    if (!rowData) continue;
                    const columns = parseCSVRow(rowData);
                    if (columns.length >= 3) {
                        const unit = columns[0].trim().replace(/^"|"$/g, '');
                        const topic = columns[1].trim().replace(/^"|"$/g, '');
                        const url = columns[2].trim().replace(/^"|"$/g, '');
                        if (unit && topic && url) {
                            if (!unitMap[unit]) unitMap[unit] = [];
                            unitMap[unit].push({ topic, url });
                        }
                    }
                }

                mainContent.innerHTML = "";
                const sortedUnits = Object.keys(unitMap).sort((a, b) => parseInt(a) - parseInt(b));

                if (sortedUnits.length === 0) {
                    mainContent.innerHTML = "<div id='loading-msg'>등록된 자료가 없습니다.</div>";
                    return;
                }

                sortedUnits.forEach(unit => {
                    const section = document.createElement('section');
                    section.className = 'unit-section';
                    section.innerHTML = `
                        <div class="unit-header">
                            <div class="unit-badge">■ ${unit}</div>
                            <div class="unit-rule"></div>
                        </div>
                        <div class="card-grid" id="grid-${unit}"></div>
                    `;
                    mainContent.appendChild(section);

                    const grid = section.querySelector(`#grid-${unit}`);
                    unitMap[unit].forEach(item => {
                        const card = document.createElement('a');
                        card.href = item.url.startsWith('http') ? item.url : 'http://' + item.url;
                        card.target = "_blank";
                        card.className = "card";
                        card.innerHTML = `
                            <div class="card-tag">${unit}</div>
                            <div class="card-topic">${item.topic}</div>
                            <div class="card-link">바로가기 →</div>
                        `;
                        grid.appendChild(card);
                    });
                });

            } catch (error) {
                mainContent.innerHTML = `<div id='loading-msg'>데이터를 불러올 수 없습니다.<br>연결을 확인해주세요.</div>`;
            }
        }

        async function fetchVisitorData() {
            if (!scriptUrl || scriptUrl.includes("여기에")) return;
            try {
                const fetchUrl = `${scriptUrl}${scriptUrl.includes('?') ? '&' : '?'}t=${new Date().getTime()}`;
                const response = await fetch(fetchUrl);
                const data = await response.json();
                document.getElementById('today-count').innerText = data.today || '0';
                document.getElementById('total-count').innerText = data.total || '0';
            } catch (e) {
                document.getElementById('today-count').innerText = '-';
                document.getElementById('total-count').innerText = '-';
            }
        }

        fetchAndRenderData();
        fetchVisitorData();
    </script>
</body>
</html>
